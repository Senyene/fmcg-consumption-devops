name: Deploy to AWS
on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Generate Dashboard
        run: python generate_report.py

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init and Apply
        working-directory: ./terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # Extract clean bucket name
          BUCKET_NAME=$(cd terraform && terraform output -raw bucket_name 2>/dev/null | grep -v '^\[command\]' | head -n1 | awk -F'::' '{print $1}')
          
          if [[ ! "$BUCKET_NAME" =~ ^fmcg-consumption-dashboard- ]]; then
            echo "ERROR: Invalid bucket name retrieved: '$BUCKET_NAME'"
            exit 1
          fi
          
          echo "Uploading to bucket: $BUCKET_NAME"
          aws s3 cp index.html "s3://$BUCKET_NAME/index.html" --region us-east-1 --acl public-read
