name: Deploy to AWS
on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Generate Dashboard
        run: python generate_report.py

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init and Apply
        working-directory: ./terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # Fetch the exact bucket name, discarding any stderr (like debug messages)
          BUCKET_NAME=$(cd terraform && terraform output -raw bucket_name 2>/dev/null)
          
          # Verify we got a non-empty bucket name
          if [ -z "$BUCKET_NAME" ]; then
            echo "ERROR: Could not retrieve bucket name from Terraform output."
            exit 1
          fi
          
          echo "Uploading to bucket: $BUCKET_NAME"
          # Upload the generated HTML; quote the S3 URI to avoid argument splitting
          aws s3 cp index.html "s3://$BUCKET_NAME/index.html" --region us-east-1
